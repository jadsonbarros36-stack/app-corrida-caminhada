<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrida & Caminhada</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#111827,#1f2937);
  color:white;
  text-align:center;
  padding:30px;
}

h1{
  margin-bottom:10px;
}

.card{
  background:#1f2937;
  padding:25px;
  border-radius:20px;
  max-width:400px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:#10b981;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.resultado{
  margin-top:20px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🏃 Corrida & Caminhada</h1>

<div class="card">
  <input type="number" id="distancia" placeholder="Distância (km)">
  <input type="number" id="tempo" placeholder="Tempo (minutos)">
  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="velocidade"></div>
  <div class="resultado" id="ritmo"></div>
</div>

<script>
function calcular(){
  let distancia = parseFloat(document.getElementById("distancia").value);
  let tempoMin = parseFloat(document.getElementById("tempo").value);

  if(!distancia || !tempoMin){
    alert("Preencha todos os campos!");
    return;
  }

  let tempoHoras = tempoMin / 60;
  let velocidade = distancia / tempoHoras;
  let ritmo = tempoMin / distancia;

  document.getElementById("velocidade").innerHTML =
    "🚀 Velocidade: " + velocidade.toFixed(2) + " km/h";

  document.getElementById("ritmo").innerHTML =
    "🎯 Ritmo: " + ritmo.toFixed(2) + " min/km";
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
