<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrida PRO</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#fc5200">

<style>
:root{
  --primary:#fc5200;
  --bg:#0d1117;
  --card:#161b22;
  --text:#ffffff;
}

.light{
  --bg:#f3f4f6;
  --card:#ffffff;
  --text:#111827;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

header{
  background:var(--primary);
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
}

.container{
  padding:20px;
  max-width:450px;
  margin:auto;
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:25px;
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
  margin-top:-40px;
}

input{
  width:100%;
  padding:16px;
  margin:12px 0;
  border-radius:15px;
  border:none;
  font-size:17px;
  background:#e5e7eb;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:var(--primary);
  color:white;
  font-size:17px;
  font-weight:bold;
  margin-top:15px;
  box-shadow:0 8px 20px rgba(252,82,0,0.4);
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}

.resultado{
  margin-top:20px;
  font-size:20px;
  font-weight:600;
  text-align:center;
}

.toggle{
  text-align:right;
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
  opacity:0.8;
}
</style>
</head>

<body>

<header>🏃 CORRIDA PRO</header>

<div class="container">
<div class="card">

<div class="toggle" onclick="alternarTema()">🌙 / ☀️</div>

<input type="number" id="distancia" placeholder="Distância em KM">
<input type="number" id="tempo" placeholder="Tempo em Minutos">

<button onclick="calcular()">CALCULAR</button>

<div class="resultado" id="velocidade"></div>
<div class="resultado" id="ritmo"></div>

</div>
</div>

<script>
function calcular(){
  let distancia=parseFloat(document.getElementById("distancia").value);
  let tempo=parseFloat(document.getElementById("tempo").value);

  if(!distancia || !tempo){
    alert("Preencha todos os campos!");
    return;
  }

  let velocidade=distancia/(tempo/60);
  let ritmo=tempo/distancia;

  document.getElementById("velocidade").innerHTML=
    "🚀 "+velocidade.toFixed(2)+" km/h";

  document.getElementById("ritmo").innerHTML=
    "🎯 "+ritmo.toFixed(2)+" min/km";
}

function alternarTema(){
  document.body.classList.toggle("light");
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
