<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrida & Caminhada</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#fc4c02">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#ffffff;
  --primary:#fc4c02;
}

.light{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#111827;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

header{
  padding:20px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  background:var(--primary);
  color:white;
}

.container{
  padding:20px;
  max-width:420px;
  margin:auto;
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  margin-bottom:20px;
  transition:0.3s;
}

input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  font-size:16px;
  background:#e2e8f0;
}

.light input{
  background:#f1f5f9;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:var(--primary);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.resultado{
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
}

.toggle{
  text-align:center;
  margin-bottom:15px;
  cursor:pointer;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>🏃 Corrida & Caminhada</header>

<div class="container">

<div class="toggle" onclick="alternarTema()">
🌙 / ☀️ Alternar Modo
</div>

<div class="card">
  <input type="number" id="distancia" placeholder="Distância (km)">
  <input type="number" id="tempo" placeholder="Tempo (minutos)">
  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="velocidade"></div>
  <div class="resultado" id="ritmo"></div>
</div>

</div>

<script>
function calcular(){
  let distancia = parseFloat(document.getElementById("distancia").value);
  let tempoMin = parseFloat(document.getElementById("tempo").value);

  if(!distancia || !tempoMin){
    alert("Preencha todos os campos!");
    return;
  }

  let tempoHoras = tempoMin / 60;
  let velocidade = distancia / tempoHoras;
  let ritmo = tempoMin / distancia;

  document.getElementById("velocidade").innerHTML =
    "🚀 Velocidade: " + velocidade.toFixed(2) + " km/h";

  document.getElementById("ritmo").innerHTML =
    "🎯 Ritmo: " + ritmo.toFixed(2) + " min/km";
}

function alternarTema(){
  document.body.classList.toggle("light");
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
